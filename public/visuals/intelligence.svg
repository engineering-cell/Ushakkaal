<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 210) rotate(54) scale(520 420)">
      <stop stop-color="#b89b5e" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#b89b5e" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 160) rotate(120) scale(520 420)">
      <stop stop-color="#f4f0e8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="140" y1="620" x2="1060" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f0e8" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#f4f0e8" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#b89b5e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4f0e8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="#090909"/>
  <rect width="1200" height="720" fill="url(#g1)"/>
  <rect width="1200" height="720" fill="url(#g2)"/>

  <!-- Grid -->
  <g opacity="0.14" stroke="#f4f0e8" stroke-width="1">
    <path d="M0 120H1200M0 220H1200M0 320H1200M0 420H1200M0 520H1200M0 620H1200"/>
    <path d="M140 0V720M280 0V720M420 0V720M560 0V720M700 0V720M840 0V720M980 0V720M1120 0V720"/>
  </g>

  <!-- Signal curve -->
  <path d="M160 560 C 320 430, 420 470, 540 360 C 660 250, 770 250, 900 190 C 1010 140, 1080 160, 1120 130" stroke="url(#line)" stroke-width="2" fill="none"/>

  <!-- Nodes -->
  <g>
    <circle cx="160" cy="560" r="7" fill="#f4f0e8" opacity="0.65"/>
    <circle cx="540" cy="360" r="8" fill="#b89b5e" opacity="0.95" filter="url(#glow)"/>
    <circle cx="900" cy="190" r="7" fill="#f4f0e8" opacity="0.55"/>
    <circle cx="1120" cy="130" r="9" fill="#b89b5e" opacity="0.85" filter="url(#glow)"/>
  </g>

  <!-- Faint connections -->
  <g stroke="#b89b5e" stroke-opacity="0.18">
    <path d="M220 520 L 540 360" />
    <path d="M540 360 L 820 240" />
    <path d="M820 240 L 1120 130" />
  </g>
</svg>

