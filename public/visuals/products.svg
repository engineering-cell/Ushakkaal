<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <radialGradient id="p1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 260) rotate(48) scale(560 460)">
      <stop stop-color="#b89b5e" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p2" x1="120" y1="560" x2="1080" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f0e8" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#f4f0e8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f4f0e8" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="#090909"/>
  <rect width="1200" height="720" fill="url(#p1)"/>

  <!-- Tiles -->
  <g stroke="#f4f0e8" stroke-opacity="0.16">
    <rect x="150" y="160" width="420" height="180" rx="28"/>
    <rect x="630" y="160" width="420" height="180" rx="28"/>
    <rect x="150" y="380" width="420" height="180" rx="28"/>
    <rect x="630" y="380" width="420" height="180" rx="28"/>
  </g>

  <!-- Icons -->
  <g fill="#b89b5e" opacity="0.85">
    <circle cx="220" cy="230" r="10"/>
    <circle cx="700" cy="230" r="10"/>
    <circle cx="220" cy="450" r="10"/>
    <circle cx="700" cy="450" r="10"/>
  </g>

  <!-- Connecting line -->
  <path d="M240 230 C 390 120, 540 580, 700 450 C 860 320, 980 340, 1030 230" stroke="url(#p2)" stroke-width="2" fill="none"/>

  <!-- Ambient glow -->
  <circle cx="930" cy="160" r="120" fill="#b89b5e" opacity="0.12" filter="url(#soft)"/>
</svg>

